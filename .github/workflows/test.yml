# NEXOS — Tests + Coverage
# Phase M du chantier mise_a_niveau (v4.2.0).
name: Tests

on:
  push:
    branches: [main, "feature/**", "fix/**", "chore/**", "refactor/**"]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,wizard,dev]"

      - name: Fix soic symlink (post-checkout on Linux runners)
        # Le symlink relatif ../soic_v3 peut manquer de cible si soic_v3
        # n'est pas dans le repo. Fix si absent.
        run: |
          if [ ! -d "soic_v3" ] && [ -d "../soic_v3" ]; then
            echo "soic_v3 not in repo root — assuming sibling layout"
          fi
          ls -la soic || echo "soic symlink state"

      - name: Run tests with coverage
        run: |
          pytest --cov=nexos --cov=soic \
                 --cov-report=term \
                 --cov-report=xml \
                 --cov-fail-under=70 \
                 -m "not e2e"

      - name: Upload coverage to Codecov (non bloquant)
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./coverage.xml
          flags: unittests

      - name: Archive coverage report (artifact)
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  e2e:
    name: E2E tests (orchestrator smoke)
    runs-on: ubuntu-latest
    # E2E plus lourds : ne tourner que sur push main + nightly
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[api,wizard,dev]"
      - name: Run E2E
        run: pytest -m e2e -v
