# NEXOS — Tests + Coverage
# Phase M du chantier mise_a_niveau (v4.2.0).
name: Tests

on:
  push:
    branches: [main, "feature/**", "fix/**", "chore/**", "refactor/**"]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          path: nexos

      - name: Checkout soic (sibling)
        # Repo séparé AILabManager-tech/soic, installé en éditable.
        # Si privé : requiert secret SOIC_REPO_TOKEN (PAT fine-grained, read sur soic).
        # Si public : SOIC_REPO_TOKEN peut être omis.
        uses: actions/checkout@v4
        with:
          repository: AILabManager-tech/soic
          path: soic_v3
          token: ${{ secrets.SOIC_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: nexos/pyproject.toml

      - name: Install deps (soic d'abord, puis NEXOS)
        working-directory: nexos
        run: |
          python -m pip install --upgrade pip
          pip install -e ../soic_v3
          pip install -e ".[api,wizard,dev]"

      - name: Run tests with coverage
        working-directory: nexos
        run: |
          pytest --cov=nexos --cov=soic \
                 --cov-report=term \
                 --cov-report=xml \
                 --cov-fail-under=70 \
                 -m "not e2e"

      - name: Upload coverage to Codecov (non bloquant)
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./nexos/coverage.xml
          flags: unittests

      - name: Archive coverage report (artifact)
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: nexos/coverage.xml
          retention-days: 14

  vitest-clients:
    name: Vitest (client sites)
    runs-on: ubuntu-latest
    # Détecte les régressions UI / Zod / API handlers + invariants
    # structurels NEXOS (headers sécurité, next.config, i18n, Loi 25,
    # middleware, robots/sitemap) sur les sites clients.
    # mark_systems_demo : 34 tests internes (src/).
    # vertex-pmo + 4 sites : 18 tests d'invariants (P9 D1).
    # depanneur-nobert : migré vers 01_business/clients/03_Depanneur_Nobert/
    #   le 2026-05-17 (cf MIGRATED.md du commit 25dbeed). Plus de site/
    #   à la racine du repo NEXOS → retiré du matrix CI.
    strategy:
      fail-fast: false
      matrix:
        client:
          - vertex-pmo
          - beaumont-avocats
          - clinique-aura
          - collectif-nova
          - electro-maitre-industriel
          - table-de-marguerite
          - mark_systems_demo
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/${{ matrix.client }}/site/package-lock.json
      - name: Install client deps
        working-directory: clients/${{ matrix.client }}/site
        run: npm ci --prefer-offline --no-audit
      - name: Run Vitest
        working-directory: clients/${{ matrix.client }}/site
        run: npm test -- --run
      - name: Run TypeScript check
        working-directory: clients/${{ matrix.client }}/site
        run: npx tsc --noEmit
      - name: Build site (smoke)
        working-directory: clients/${{ matrix.client }}/site
        run: npm run build

  e2e:
    name: E2E tests (orchestrator smoke)
    runs-on: ubuntu-latest
    # E2E plus lourds : ne tourner que sur push main + nightly
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          path: nexos
      - name: Checkout soic (sibling)
        uses: actions/checkout@v4
        with:
          repository: AILabManager-tech/soic
          path: soic_v3
          token: ${{ secrets.SOIC_REPO_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: nexos/pyproject.toml
      - name: Install (soic + NEXOS)
        working-directory: nexos
        run: |
          pip install -e ../soic_v3
          pip install -e ".[api,wizard,dev]"
      - name: Run E2E
        working-directory: nexos
        run: pytest -m e2e -v
